<body>

        <div><button id='confirm-yes' class='confirm-button'>Да</button><button id='confirm-no' class='confirm-button'>Нєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєєє</button></div>

    <div id='inventory-modal' class='modal-backdrop'>
        <div class='modal-content'>
            <h2>Інвєнтар</h2>
            <button id='inventory-close-button' class='modal-close-button'>X</button>
            <div id='inventory-grid'></div>
            <div id='inventory-hotbar-container'><h3>Хот бар</h3><div id='inventory-hotbar'></div></div>
        </div>
    </div>
    <div id='inventory-hand'></div>
    <div id='debug-info'></div>

    <script type='module'>
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

        const WORLD_WIDTH = 128, WORLD_HEIGHT = 256, WORLD_DEPTH = 128;
        const CHUNK_SIZE = 16;
        const CHUNKS_X = Math.ceil(WORLD_WIDTH / CHUNK_SIZE);
        const CHUNKS_Z = Math.ceil(WORLD_DEPTH / CHUNK_SIZE);
        const VOID_Y = -64, RESPAWN_Y = WORLD_HEIGHT + 5;

        const PLAYER_WIDTH = 0.6, PLAYER_HEIGHT = 1.8, PLAYER_HEIGHT_CROUCH = 1.2;
        const PLAYER_EYE_HEIGHT = 1.62, PLAYER_EYE_HEIGHT_CROUCH = 1.0;
        const PLAYER_SPEED = 5.0, PLAYER_SPEED_CROUCH = 2.5, PLAYER_JUMP_FORCE = 7.0, GRAVITY = -20.0;
        const MOUSE_SENSITIVITY = 0.002, TOUCH_SENSITIVITY = 0.003;
        const ZEFABLOCK_TEXTURE_URL = 'zefablock.png';

        const BLOCKS = {
            AIR: 0, GRASS: 1, STONE: 2, WOOD: 3, LEAVES: 4, WATER: 5, ZEFABLOCK: 6,
            WHITE: 7, RED: 8, ORANGE: 9, YELLOW: 10, LIME: 11, GREEN: 12, CYAN: 13, BLUE: 14,
            MAGENTA: 15, PURPLE: 16, BROWN: 17, GRAY: 18, LIGHT_GRAY: 19, BLACK: 20, PINK: 21,
            WHITE_GLASS: 22, RED_GLASS: 23, ORANGE_GLASS: 24, YELLOW_GLASS: 25, LIME_GLASS: 26, GREEN_GLASS: 27,
            CYAN_GLASS: 28, BLUE_GLASS: 29, MAGENTA_GLASS: 30, PURPLE_GLASS: 31, BROWN_GLASS: 32, GRAY_GLASS: 33,
            LIGHT_GRAY_GLASS: 34, BLACK_GLASS: 35, PINK_GLASS: 36, GLASS: 37,
        };

        const BLOCK_TYPES = {
            [BLOCKS.AIR]: { name: 'Повітря', transparent: true },
            [BLOCKS.GRASS]: { name: 'Трава', color: 0x44aa44, topColor: 0x55dd55, sideColor: 0x9b7653 },
            [BLOCKS.STONE]: { name: 'Камєнь', color: 0x888888 },
            [BLOCKS.WOOD]: { name: 'Дерево', color: 0x856a4f, topColor: 0xaf8e70, sideColor: 0x856a4f },
            [BLOCKS.LEAVES]: { name: 'Листя', color: 0x22aa22, transparent: true, opacity: 0.8 },
            [BLOCKS.WATER]: { name: 'Вода', color: 0x4444ff, transparent: true, opacity: 0.6 },
            [BLOCKS.ZEFABLOCK]: { name: 'Зєфаблок', customTexture: true },
            [BLOCKS.WHITE]: { name: 'Бєлий', color: 0xffffff }, [BLOCKS.RED]: { name: 'Червоний', color: 0xff0000 },
            [BLOCKS.ORANGE]: { name: 'Помаранчевий', color: 0xffa500 }, [BLOCKS.YELLOW]: { name: 'Жовтий', color: 0xffff00 },
            [BLOCKS.LIME]: { name: 'Лайм', color: 0x00ff00 }, [BLOCKS.GREEN]: { name: 'Зельоний', color: 0x008000 },
            [BLOCKS.CYAN]: { name: 'Блакитний', color: 0x00ffff }, [BLOCKS.BLUE]: { name: 'Синій', color: 0x0000ff },
            [BLOCKS.MAGENTA]: { name: 'Маджента', color: 0xff00ff }, [BLOCKS.PURPLE]: { name: 'Фіалєтавий', color: 0x800080 },
            [BLOCKS.BROWN]: { name: 'Коричневий', color: 0x964B00 }, [BLOCKS.GRAY]: { name: 'Сірий', color: 0x808080 },
            [BLOCKS.LIGHT_GRAY]: { name: 'Свєтла-сірий', color: 0xd3d3d3 }, [BLOCKS.BLACK]: { name: 'Чорний', color: 0x000000 },
            [BLOCKS.PINK]: { name: 'Розавий', color: 0xffc0cb },
            [BLOCKS.WHITE_GLASS]: { name: 'Біле скло', color: 0xffffff, transparent: true, opacity: 0.3 },
            [BLOCKS.RED_GLASS]: { name: 'Червоне скло', color: 0xff0000, transparent: true, opacity: 0.3 },
            [BLOCKS.ORANGE_GLASS]: { name: 'Помаранчеве скло', color: 0xffa500, transparent: true, opacity: 0.3 },
            [BLOCKS.YELLOW_GLASS]: { name: 'Жовте скло', color: 0xffff00, transparent: true, opacity: 0.3 },
            [BLOCKS.LIME_GLASS]: { name: 'Лаймове скло', color: 0x00ff00, transparent: true, opacity: 0.3 },
            [BLOCKS.GREEN_GLASS]: { name: 'Зелене скло', color: 0x008000, transparent: true, opacity: 0.3 },
            [BLOCKS.CYAN_GLASS]: { name: 'Блакитне скло', color: 0x00ffff, transparent: true, opacity: 0.3 },
            [BLOCKS.BLUE_GLASS]: { name: 'Синє скло', color: 0x0000ff, transparent: true, opacity: 0.3 },
            [BLOCKS.MAGENTA_GLASS]: { name: 'Маджента скло', color: 0xff00ff, transparent: true, opacity: 0.3 },
            [BLOCKS.PURPLE_GLASS]: { name: 'Фіолетове скло', color: 0x800080, transparent: true, opacity: 0.3 },
            [BLOCKS.BROWN_GLASS]: { name: 'Коричневе скло', color: 0x964B00, transparent: true, opacity: 0.3 },
            [BLOCKS.GRAY_GLASS]: { name: 'Сіре скло', color: 0x808080, transparent: true, opacity: 0.3 },
            [BLOCKS.LIGHT_GRAY_GLASS]: { name: 'Світле сіре скло', color: 0xd3d3d3, transparent: true, opacity: 0.3 },
            [BLOCKS.BLACK_GLASS]: { name: 'Чорне скло', color: 0x333333, transparent: true, opacity: 0.3 },
            [BLOCKS.PINK_GLASS]: { name: 'Розаване скло', color: 0xffc0cb, transparent: true, opacity: 0.3 },
            [BLOCKS.GLASS]: { name: 'Скло', color: 0xeeeeff, transparent: true, opacity: 0.25 },
        };

        class Chunk {
            constructor(chunkX, chunkZ) {
                this.chunkX = chunkX;
                this.chunkZ = chunkZ;
                this.blocks = new Uint8Array(CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE);
                this.meshes = {};
                this.isDirty = false;
                this.isLoaded = false;
            }

            getBlock(x, y, z) {
                if (x < 0 || x >= CHUNK_SIZE || y < 0 || y >= WORLD_HEIGHT || z < 0 || z >= CHUNK_SIZE) return BLOCKS.AIR;
                const idx = y * CHUNK_SIZE * CHUNK_SIZE + z * CHUNK_SIZE + x;
                return this.blocks[idx];
            }

            setBlock(x, y, z, blockId) {
                if (x < 0 || x >= CHUNK_SIZE || y < 0 || y >= WORLD_HEIGHT || z < 0 || z >= CHUNK_SIZE) return;
                const idx = y * CHUNK_SIZE * CHUNK_SIZE + z * CHUNK_SIZE + x;
                if (this.blocks[idx] !== blockId) {
                    this.blocks[idx] = blockId;
                    this.isDirty = true;
                }
            }

            rebuild(scene, blockMaterials) {
                for (const blockId in this.meshes) {
                    if (this.meshes[blockId]) scene.remove(this.meshes[blockId]);
                }
                this.meshes = {};

                const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
                const counts = {};
                const dummy = new THREE.Object3D();

                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        for (let x = 0; x < CHUNK_SIZE; x++) {
                            const blockId = this.getBlock(x, y, z);
                            if (blockId === BLOCKS.AIR) continue;

                            let isVisible = false;
                            const neighbors = [[x+1,y,z],[x-1,y,z],[x,y+1,z],[x,y-1,z],[x,y,z+1],[x,y,z-1]];
                            
                            for (const [nx, ny, nz] of neighbors) {
                                const nId = this.getBlock(nx, ny, nz);
                                const nType = BLOCK_TYPES[nId];
                                if (nId === BLOCKS.AIR || (nType && nType.transparent && nId !== blockId)) {
                                    isVisible = true;
                                    break;
                                }
                            }

                            if (!isVisible && BLOCK_TYPES[blockId].transparent) {
                                for (const [nx, ny, nz] of neighbors) {
                                    if (this.getBlock(nx, ny, nz) !== blockId) {
                                        isVisible = true;
                                        break;
                                    }
                                }
                            }

                            if (!isVisible) continue;

                            if (!counts[blockId]) counts[blockId] = 0;
                            const wxPos = this.chunkX * CHUNK_SIZE + x;
                            const wyPos = y;
                            const wzPos = this.chunkZ * CHUNK_SIZE + z;

                            dummy.position.set(wxPos + 0.5, wyPos + 0.5, wzPos + 0.5);
                            dummy.updateMatrix();

                            if (!this.meshes[blockId]) {
                                const maxBlocks = CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE;
                                const mesh = new THREE.InstancedMesh(blockGeometry, blockMaterials[blockId], maxBlocks);
                                mesh.count = 0;
                                scene.add(mesh);
                                this.meshes[blockId] = mesh;
                                counts[blockId] = 0;
                            }

                            this.meshes[blockId].setMatrixAt(counts[blockId], dummy.matrix);
                            counts[blockId]++;
                        }
                    }
                }

                for (const blockId in this.meshes) {
                    this.meshes[blockId].count = counts[blockId] || 0;
                    this.meshes[blockId].instanceMatrix.needsUpdate = true;
                }

                this.isDirty = false;
                this.isLoaded = true;
            }
        }

        class Player {
            constructor() {
                this.pos = new THREE.Vector3(WORLD_WIDTH / 2, RESPAWN_Y, WORLD_DEPTH / 2);
                this.vel = new THREE.Vector3(0, 0, 0);
                this.rotation = { yaw: 0, pitch: 0 };
                this.onGround = false;
                this.isCrouching = false;
            }

            getHeight() {
                return this.isCrouching ? PLAYER_HEIGHT_CROUCH : PLAYER_HEIGHT;
            }

            getEyeHeight() {
                return this.isCrouching ? PLAYER_EYE_HEIGHT_CROUCH : PLAYER_EYE_HEIGHT;
            }

            getCollisionBox() {
                const h = this.getHeight();
                const r = PLAYER_WIDTH / 2 - 0.001;
                return {
                    minX: this.pos.x - r,
                    maxX: this.pos.x + r,
                    minY: this.pos.y,
                    maxY: this.pos.y + h - 0.001,
                    minZ: this.pos.z - r,
                    maxZ: this.pos.z + r,
                };
            }

            respawn() {
                this.pos.set(WORLD_WIDTH / 2, RESPAWN_Y, WORLD_DEPTH / 2);
                this.vel.set(0, 0, 0);
                this.rotation = { yaw: 0, pitch: 0 };
                this.isCrouching = false;
            }
        }

        class GameCamera {
            constructor(threeCamera) {
                this.camera = threeCamera;
                this.rotation = { yaw: 0, pitch: 0 };
            }

            update(player) {
                this.rotation.yaw = player.rotation.yaw;
                this.rotation.pitch = player.rotation.pitch;

                const eyeY = player.getEyeHeight();
                const eyePos = new THREE.Vector3(
                    player.pos.x,
                    player.pos.y + eyeY,
                    player.pos.z
                );

                const direction = new THREE.Vector3(0, 0, -1);
                direction.applyEuler(new THREE.Euler(this.rotation.pitch, this.rotation.yaw, 0, 'YXZ'));

                this.camera.position.copy(eyePos);
                this.camera.lookAt(eyePos.clone().add(direction));
            }
        }

        let scene, camera, renderer, clock, raycaster;
        let gameCamera;
        let player;
        let chunks = new Map();
        let blockMaterials = {};
        let hotbarItems = [BLOCKS.GRASS, BLOCKS.STONE, BLOCKS.WOOD, BLOCKS.ZEFABLOCK, BLOCKS.GLASS, BLOCKS.WHITE_GLASS, BLOCKS.RED, BLOCKS.BLUE, BLOCKS.YELLOW];
        let selectedBlockId = hotbarItems[0];
        let isTouchDevice = 'ontouchstart' in window;
        let isMenuOpen = false, isInventoryOpen = false, heldInventoryBlock = null;
        let debugMode = false;
        let lastDelta = 0;

        const canvas = document.getElementById('game-canvas');
        const hotbarEl = document.getElementById('hotbar');
        const mobileControlsEl = document.getElementById('mobile-controls');
        const joystickArea = document.getElementById('joystick-area');
        const joystickThumb = document.getElementById('joystick-thumb');
        const lookArea = document.getElementById('look-area');
        const jumpButton = document.getElementById('jump-button');
        const placeButton = document.getElementById('place-button');
        const breakButton = document.getElementById('break-button');
        const crouchButton = document.getElementById('crouch-button');
        const messageModal = document.getElementById('message-modal');
        const crosshair = document.getElementById('crosshair');
        const menuButton = document.getElementById('menu-button');
        const inventoryButton = document.getElementById('inventory-button');
        const menuModal = document.getElementById('menu-modal');
        const resumeButton = document.getElementById('resume-button');
        const saveButton = document.getElementById('save-button');
        const loadButton = document.getElementById('load-button');
        const resetButton = document.getElementById('reset-button');
        const backToMenuButton = document.getElementById('back-to-menu-button');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmText = document.getElementById('confirm-text');
        const confirmYes = document.getElementById('confirm-yes');
        const confirmNo = document.getElementById('confirm-no');
        const inventoryModal = document.getElementById('inventory-modal');
        const inventoryGrid = document.getElementById('inventory-grid');
        const inventoryHotbar = document.getElementById('inventory-hotbar');
        const inventoryHand = document.getElementById('inventory-hand');
        const inventoryCloseButton = document.getElementById('inventory-close-button');
        const debugInfo = document.getElementById('debug-info');

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, moveJump = false;
        let breakAction = false, placeAction = false;
        let joystickDelta = { x: 0, y: 0 };
        let lookDelta = { x: 0, y: 0 };
        let lastTouch = { x: 0, y: 0 };
        let lookTouchId = null;
        let joystickTouchId = null;

        function getChunk(chunkX, chunkZ) {
            const key = `${chunkX},${chunkZ}`;
            if (!chunks.has(key)) {
                chunks.set(key, new Chunk(chunkX, chunkZ));
            }
            return chunks.get(key);
        }

        function getBlock(wx, wy, wz) {
            wx = Math.floor(wx); wy = Math.floor(wy); wz = Math.floor(wz);
            if (wx < 0 || wx >= WORLD_WIDTH || wy < 0 || wy >= WORLD_HEIGHT || wz < 0 || wz >= WORLD_DEPTH) return BLOCKS.AIR;
            const chunkX = Math.floor(wx / CHUNK_SIZE);
            const chunkZ = Math.floor(wz / CHUNK_SIZE);
            const chunk = getChunk(chunkX, chunkZ);
            const localX = wx - chunkX * CHUNK_SIZE;
            const localZ = wz - chunkZ * CHUNK_SIZE;
            return chunk.getBlock(localX, wy, localZ);
        }

        function setBlock(wx, wy, wz, blockId) {
            wx = Math.floor(wx); wy = Math.floor(wy); wz = Math.floor(wz);
            if (wx < 0 || wx >= WORLD_WIDTH || wy < 0 || wy >= WORLD_HEIGHT || wz < 0 || wz >= WORLD_DEPTH) return;
            const chunkX = Math.floor(wx / CHUNK_SIZE);
            const chunkZ = Math.floor(wz / CHUNK_SIZE);
            const chunk = getChunk(chunkX, chunkZ);
            const localX = wx - chunkX * CHUNK_SIZE;
            const localZ = wz - chunkZ * CHUNK_SIZE;
            chunk.setBlock(localX, wy, localZ, blockId);

            if (localX === 0 && chunkX > 0) getChunk(chunkX - 1, chunkZ).isDirty = true;
            if (localX === CHUNK_SIZE - 1 && chunkX < CHUNKS_X - 1) getChunk(chunkX + 1, chunkZ).isDirty = true;
            if (localZ === 0 && chunkZ > 0) getChunk(chunkX, chunkZ - 1).isDirty = true;
            if (localZ === CHUNK_SIZE - 1 && chunkZ < CHUNKS_Z - 1) getChunk(chunkX, chunkZ + 1).isDirty = true;
        }

        function generateWorld() {
            for (let cx = 0; cx < CHUNKS_X; cx++) {
                for (let cz = 0; cz < CHUNKS_Z; cz++) {
                    const chunk = getChunk(cx, cz);
                    for (let x = 0; x < CHUNK_SIZE; x++) {
                        for (let z = 0; z < CHUNK_SIZE; z++) {
                            for (let y = 0; y < WORLD_HEIGHT; y++) {
                                let blockId = BLOCKS.AIR;
                                if (y < WORLD_HEIGHT / 4 - 1) blockId = BLOCKS.STONE;
                                else if (y < WORLD_HEIGHT / 4) blockId = BLOCKS.GRASS;
                                chunk.setBlock(x, y, z, blockId);
                            }
                        }
                    }
                }
            }
        }

        function updateChunks() {
            const playerChunkX = Math.floor(player.pos.x / CHUNK_SIZE);
            const playerChunkZ = Math.floor(player.pos.z / CHUNK_SIZE);
            const loadDistance = 2;

            for (let cx = playerChunkX - loadDistance; cx <= playerChunkX + loadDistance; cx++) {
                for (let cz = playerChunkZ - loadDistance; cz <= playerChunkZ + loadDistance; cz++) {
                    if (cx < 0 || cx >= CHUNKS_X || cz < 0 || cz >= CHUNKS_Z) continue;
                    const chunk = getChunk(cx, cz);
                    if (chunk.isDirty && chunk.isLoaded) {
                        chunk.rebuild(scene, blockMaterials);
                    } else if (!chunk.isLoaded) {
                        chunk.rebuild(scene, blockMaterials);
                    }
                }
            }
        }

        function createMaterials() {
            const loader = new THREE.TextureLoader();
            const zefaTexture = loader.load(ZEFABLOCK_TEXTURE_URL);
            zefaTexture.magFilter = THREE.NearestFilter;
            zefaTexture.minFilter = THREE.NearestFilter;

            for (const blockId in BLOCK_TYPES) {
                const block = BLOCK_TYPES[blockId];
                if (block.transparent) continue;
                
                if (block.customTexture) {
                    blockMaterials[blockId] = new THREE.MeshLambertMaterial({ map: zefaTexture });
                } else if (block.topColor) {
                    blockMaterials[blockId] = [
                        new THREE.MeshLambertMaterial({ color: block.sideColor || block.color }),
                        new THREE.MeshLambertMaterial({ color: block.sideColor || block.color }),
                        new THREE.MeshLambertMaterial({ color: block.topColor || block.color }),
                        new THREE.MeshLambertMaterial({ color: block.color }),
                        new THREE.MeshLambertMaterial({ color: block.sideColor || block.color }),
                        new THREE.MeshLambertMaterial({ color: block.sideColor || block.color }),
                    ];
                } else {
                    blockMaterials[blockId] = new THREE.MeshLambertMaterial({ color: block.color || 0xff00ff });
                }
            }

            blockMaterials[BLOCKS.LEAVES] = new THREE.MeshLambertMaterial({ color: BLOCK_TYPES[BLOCKS.LEAVES].color, transparent: true, opacity: BLOCK_TYPES[BLOCKS.LEAVES].opacity, alphaTest: 0.1, side: THREE.DoubleSide });
            blockMaterials[BLOCKS.WATER] = new THREE.MeshLambertMaterial({ color: BLOCK_TYPES[BLOCKS.WATER].color, transparent: true, opacity: BLOCK_TYPES[BLOCKS.WATER].opacity, side: THREE.DoubleSide });

            for (let i = 0; i < 16; i++) {
                const blockId = BLOCKS.WHITE_GLASS + i;
                const block = BLOCK_TYPES[blockId];
                if (block) {
                    blockMaterials[blockId] = new THREE.MeshLambertMaterial({ color: block.color, transparent: true, opacity: block.opacity, side: THREE.DoubleSide });
                }
            }
            blockMaterials[BLOCKS.GLASS] = new THREE.MeshLambertMaterial({ color: BLOCK_TYPES[BLOCKS.GLASS].color, transparent: true, opacity: BLOCK_TYPES[BLOCKS.GLASS].opacity, side: THREE.DoubleSide });
        }

        function createHotbarItem(blockId) {
            const item = document.createElement('div');
            item.className = 'hotbar-item';
            const blockType = BLOCK_TYPES[blockId];
            if (blockType.customTexture) {
                item.style.backgroundImage = `url(${ZEFABLOCK_TEXTURE_URL})`;
            } else if (blockType.topColor) {
                item.style.backgroundColor = `#${blockType.topColor.toString(16).padStart(6, '0')}`;
            } else {
                item.style.backgroundColor = `#${(blockType.color || 0xcccccc).toString(16).padStart(6, '0')}`;
            }
            item.textContent = blockType.name.substring(0, 3).toUpperCase();
            return item;
        }

        function updateHotbarUI() {
            hotbarEl.innerHTML = '';
            hotbarItems.forEach((blockId) => {
                const item = createHotbarItem(blockId);
                if (blockId === selectedBlockId) item.classList.add('selected');
                item.addEventListener('click', () => { selectedBlockId = blockId; updateHotbarUI(); });
                hotbarEl.appendChild(item);
            });
        }

        function populateInventoryGrid() {
            inventoryGrid.innerHTML = '';
            for (const blockId in BLOCK_TYPES) {
                if (blockId == BLOCKS.AIR) continue;
                const block = BLOCK_TYPES[blockId];
                const item = document.createElement('div');
                item.className = 'inventory-item';
                if (block.customTexture) {
                    item.style.backgroundImage = `url(${ZEFABLOCK_TEXTURE_URL})`;
                } else if (block.topColor) {
                    item.style.backgroundColor = `#${block.topColor.toString(16).padStart(6, '0')}`;
                } else {
                    item.style.backgroundColor = `#${(block.color || 0xcccccc).toString(16).padStart(6, '0')}`;
                }
                item.textContent = block.name.substring(0, 3).toUpperCase();
                item.title = block.name;
                item.addEventListener('click', () => handleInventoryClick(blockId));
                item.addEventListener('touchstart', (e) => { e.preventDefault(); handleInventoryClick(blockId); }, {passive: false});
                inventoryGrid.appendChild(item);
            }
        }

        function updateInventoryHotbarUI() {
            inventoryHotbar.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const blockId = hotbarItems[i];
                const item = createHotbarItem(blockId);
                item.classList.add('inventory-hotbar-slot');
                item.addEventListener('click', () => handleInventoryHotbarClick(i));
                item.addEventListener('touchstart', (e) => { e.preventDefault(); handleInventoryHotbarClick(i); }, {passive: false});
                inventoryHotbar.appendChild(item);
            }
        }

        function handleInventoryClick(blockId) {
            heldInventoryBlock = parseInt(blockId);
            const blockType = BLOCK_TYPES[blockId];
            if (blockType.customTexture) {
                inventoryHand.style.backgroundImage = `url(${ZEFABLOCK_TEXTURE_URL})`;
                inventoryHand.style.backgroundColor = 'transparent';
            } else if (blockType.topColor) {
                inventoryHand.style.backgroundColor = `#${blockType.topColor.toString(16).padStart(6, '0')}`;
                inventoryHand.style.backgroundImage = 'none';
            } else {
                inventoryHand.style.backgroundColor = `#${(blockType.color || 0xcccccc).toString(16).padStart(6, '0')}`;
                inventoryHand.style.backgroundImage = 'none';
            }
            inventoryHand.textContent = blockType.name.substring(0, 3).toUpperCase();
            inventoryHand.style.display = 'flex';
        }

        function handleInventoryHotbarClick(slotIndex) {
            if (heldInventoryBlock !== null) {
                hotbarItems[slotIndex] = heldInventoryBlock;
                heldInventoryBlock = null;
                inventoryHand.style.display = 'none';
                updateHotbarUI();
                updateInventoryHotbarUI();
            }
        }

        function showMessage(text, duration = null) {
            messageModal.textContent = text;
            messageModal.style.display = 'block';
            if (duration) setTimeout(hideMessage, duration);
        }

        function hideMessage() { messageModal.style.display = 'none'; }

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            isInventoryOpen = false;
            inventoryModal.style.display = 'none';
            menuModal.style.display = isMenuOpen ? 'block' : 'none';
            if (isMenuOpen) document.exitPointerLock();
        }

        function toggleInventory() {
            isInventoryOpen = !isInventoryOpen;
            isMenuOpen = false;
            menuModal.style.display = 'none';
            inventoryModal.style.display = isInventoryOpen ? 'block' : 'none';
            if (isInventoryOpen) {
                heldInventoryBlock = null;
                inventoryHand.style.display = 'none';
                updateInventoryHotbarUI();
                document.exitPointerLock();
            } else {
                canvas.requestPointerLock();
            }
        }

        function closeAllModals() {
            isMenuOpen = false; isInventoryOpen = false;
            menuModal.style.display = 'none'; inventoryModal.style.display = 'none'; confirmModal.style.display = 'none';
            canvas.requestPointerLock();
        }

        function toggleDebugMode() {
            debugMode = !debugMode;
            debugInfo.style.display = debugMode ? 'block' : 'none';
        }

        function init() {
            showMessage('Загрузка Зєфакрафта 3.0...');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            gameCamera = new GameCamera(camera);

            player = new Player();

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(1, 1, 0.5).normalize();
            scene.add(dirLight);

            clock = new THREE.Clock();
            raycaster = new THREE.Raycaster();

            createMaterials();
            generateWorld();
            updateChunks();
            initControls();
            initUI();
            player.respawn();
            animate();
            hideMessage();
        }

        function initControls() {
            if (isTouchDevice) initTouchControls();
            else { initPointerLock(); initKeydown(); initMouse(); }
            window.addEventListener('resize', onWindowResize);
            canvas.addEventListener('wheel', handleMouseWheel, { passive: false });
        }

        function initPointerLock() {
            canvas.addEventListener('click', () => { if (!isMenuOpen && !isInventoryOpen && !document.pointerLockElement) canvas.requestPointerLock(); });
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === canvas) {
                    crosshair.style.display = 'block';
                    document.addEventListener('mousemove', onMouseMove);
                } else {
                    document.removeEventListener('mousemove', onMouseMove);
                }
            });
        }

        function handleMouseWheel(e) {
            e.preventDefault();
            if (isMenuOpen || isInventoryOpen || !document.pointerLockElement) return;
            
            if (e.deltaY > 0) {
                let currentIndex = hotbarItems.indexOf(selectedBlockId);
                currentIndex = (currentIndex + 1) % hotbarItems.length;
                selectedBlockId = hotbarItems[currentIndex];
            } else {
                let currentIndex = hotbarItems.indexOf(selectedBlockId);
                currentIndex = (currentIndex - 1 + hotbarItems.length) % hotbarItems.length;
                selectedBlockId = hotbarItems[currentIndex];
            }
            updateHotbarUI();
        }

        function initKeydown() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'F3') { 
                    e.preventDefault(); 
                    e.stopPropagation();
                    toggleDebugMode(); 
                    return; 
                }
                if (e.code === 'Escape') { if (isInventoryOpen) toggleInventory(); else if (isMenuOpen) toggleMenu(); else if (document.pointerLockElement) document.exitPointerLock(); return; }
                if (e.code === 'KeyE') { toggleInventory(); return; }
                if (isMenuOpen || isInventoryOpen) return;
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': moveJump = true; break;
                    case 'ShiftLeft': case 'ShiftRight': player.isCrouching = true; break;
                }
                if (e.code.startsWith('Digit')) {
                    const i = parseInt(e.code[5]) - 1;
                    if (i >= 0 && i < hotbarItems.length) { selectedBlockId = hotbarItems[i]; updateHotbarUI(); }
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'Space': moveJump = false; break;
                    case 'ShiftLeft': case 'ShiftRight': player.isCrouching = false; break;
                }
            });
        }

        function initMouse() {
            canvas.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement !== canvas || isMenuOpen || isInventoryOpen) return;
                if (e.button === 0) breakAction = true; else if (e.button === 2) placeAction = true;
            });
            document.addEventListener('mouseup', (e) => {
                if (e.button === 0) breakAction = false; else if (e.button === 2) placeAction = false;
            });
        }

        function onMouseMove(e) {
            if (document.pointerLockElement !== canvas) return;
            let mx = e.movementX;
            let my = e.movementY;
            if (mx > 200) mx = 200;
            if (mx < -200) mx = -200;
            if (my > 200) my = 200;
            if (my < -200) my = -200;
            
            player.rotation.yaw -= mx * MOUSE_SENSITIVITY;
            player.rotation.pitch -= my * MOUSE_SENSITIVITY;
            player.rotation.pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, player.rotation.pitch));
        }

        function initTouchControls() {
            joystickArea.addEventListener('touchstart', handleJoystickStart, { passive: false });
            joystickArea.addEventListener('touchmove', handleJoystickMove, { passive: false });
            joystickArea.addEventListener('touchend', handleJoystickEnd, { passive: false });
            lookArea.addEventListener('touchstart', handleLookStart, { passive: false });
            lookArea.addEventListener('touchmove', handleLookMove, { passive: false });
            lookArea.addEventListener('touchend', handleLookEnd, { passive: false });
            jumpButton.addEventListener('touchstart', (e) => { e.preventDefault(); moveJump = true; });
            jumpButton.addEventListener('touchend', (e) => { e.preventDefault(); moveJump = false; });
            placeButton.addEventListener('touchstart', (e) => { e.preventDefault(); placeAction = true; });
            placeButton.addEventListener('touchend', (e) => { e.preventDefault(); placeAction = false; });
            breakButton.addEventListener('touchstart', (e) => { e.preventDefault(); breakAction = true; });
            breakButton.addEventListener('touchend', (e) => { e.preventDefault(); breakAction = false; });
            crouchButton.addEventListener('touchstart', (e) => { e.preventDefault(); player.isCrouching = true; });
            crouchButton.addEventListener('touchend', (e) => { e.preventDefault(); player.isCrouching = false; });
        }

        function handleJoystickStart(e) {
            e.preventDefault();
            if (joystickTouchId !== null) return;
            if (e.changedTouches.length === 0) return;
            const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            handleJoystickMove(e);
        }

        function handleJoystickMove(e) {
            e.preventDefault();
            if (joystickTouchId === null) return;
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.identifier === joystickTouchId) {
                    const rect = joystickArea.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    let dx = touch.clientX - cx;
                    let dy = touch.clientY - cy;
                    const maxDist = rect.width / 2 - 30;
                    const dist = Math.min(maxDist, Math.hypot(dx, dy));
                    const angle = Math.atan2(dy, dx);
                    joystickDelta.x = (dist / maxDist) * Math.cos(angle);
                    joystickDelta.y = (dist / maxDist) * Math.sin(angle);
                    joystickThumb.style.transform = `translate(calc(-50% + ${joystickDelta.x * maxDist}px), calc(-50% + ${joystickDelta.y * maxDist}px))`;
                    moveForward = -joystickDelta.y > 0.3;
                    moveBackward = -joystickDelta.y < -0.3;
                    moveLeft = joystickDelta.x < -0.3;
                    moveRight = joystickDelta.x > 0.3;
                    return;
                }
            }
        }

        function handleJoystickEnd(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystickTouchId) {
                    joystickTouchId = null;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                    joystickDelta = { x: 0, y: 0 };
                    moveForward = moveBackward = moveLeft = moveRight = false;
                    return;
                }
            }
        }

        function handleLookStart(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const rect = lookArea.getBoundingClientRect();
                if (touch.clientX > rect.left && touch.clientY > rect.top && touch.clientX < rect.right && touch.clientY < rect.bottom && touch.identifier !== joystickTouchId) {
                    if (lookTouchId !== null) return;
                    lookTouchId = touch.identifier;
                    lastTouch = { x: touch.clientX, y: touch.clientY };
                    return;
                }
            }
        }

        function handleLookMove(e) {
            e.preventDefault();
            if (lookTouchId === null) return;
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.identifier === lookTouchId) {
                    lookDelta.x = touch.clientX - lastTouch.x;
                    lookDelta.y = touch.clientY - lastTouch.y;
                    lastTouch = { x: touch.clientX, y: touch.clientY };
                    return;
                }
            }
        }

        function handleLookEnd(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === lookTouchId) {
                    lookTouchId = null;
                    lookDelta = { x: 0, y: 0 };
                    return;
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isMenuOpen || isInventoryOpen) { renderer.render(scene, camera); return; }
            
            const delta = Math.min(0.05, clock.getDelta());
            lastDelta = delta;
            handleInput(delta);
            updatePhysics(delta);
            handleBlockActions();
            updateChunks();
            gameCamera.update(player);
            updateDebugInfo();
            
            renderer.render(scene, camera);
        }

        function updateDebugInfo() {
            if (!debugMode) return;
            const chunkX = Math.floor(player.pos.x / CHUNK_SIZE);
            const chunkZ = Math.floor(player.pos.z / CHUNK_SIZE);
            const block = getBlock(player.pos.x, player.pos.y, player.pos.z);
            const blockName = BLOCK_TYPES[block] ? BLOCK_TYPES[block].name : 'Unknown';
            debugInfo.innerHTML = `
                ПОЗИЦІЯ<br>
                X: ${player.pos.x.toFixed(2)}<br>
                Y: ${player.pos.y.toFixed(2)}<br>
                Z: ${player.pos.z.toFixed(2)}<br>
                <br>
                ЧАНК: (${chunkX}, ${chunkZ})<br>
                БЛОК: ${blockName}<br>
                <br>
                ПРИСІД: ${player.isCrouching ? 'ДА' : 'НІ'}<br>
                НА ЗЕМЛІ: ${player.onGround ? 'ДА' : 'НІ'}<br>
                ШВИДКІСТЬ: ${player.vel.length().toFixed(2)}<br>
                ФПС: ${(1 / lastDelta).toFixed(0)}
            `;
        }

        function handleInput(delta) {
            if (isTouchDevice && lookTouchId !== null) {
                player.rotation.yaw -= lookDelta.x * TOUCH_SENSITIVITY;
                player.rotation.pitch -= lookDelta.y * TOUCH_SENSITIVITY;
                player.rotation.pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, player.rotation.pitch));
                lookDelta.x = lookDelta.y = 0;
            }

            const dir = new THREE.Vector3();
            if (moveForward) dir.z -= 1;
            if (moveBackward) dir.z += 1;
            if (moveLeft) dir.x -= 1;
            if (moveRight) dir.x += 1;

            if (dir.length() > 0) {
                dir.normalize();
                dir.applyEuler(new THREE.Euler(0, player.rotation.yaw, 0));
                const speed = player.isCrouching ? PLAYER_SPEED_CROUCH : PLAYER_SPEED;
                player.vel.x = dir.x * speed;
                player.vel.z = dir.z * speed;
            } else {
                player.vel.x = 0;
                player.vel.z = 0;
            }

            if (moveJump && player.onGround) {
                player.vel.y = PLAYER_JUMP_FORCE;
                player.onGround = false;
                moveJump = false;
            }
        }

        const NON_SOLID_BLOCKS = new Set([BLOCKS.AIR, BLOCKS.WATER, BLOCKS.LEAVES]);
        function isBlockSolid(blockId) { return !NON_SOLID_BLOCKS.has(blockId); }

        function handleBlockActions() {
            if (!breakAction && !placeAction) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const allMeshes = [];
            for (const chunkKey of chunks.keys()) {
                const chunk = chunks.get(chunkKey);
                for (const blockId in chunk.meshes) {
                    if (chunk.meshes[blockId]) allMeshes.push(chunk.meshes[blockId]);
                }
            }

            const intersects = raycaster.intersectObjects(allMeshes);

            if (intersects.length > 0) {
                let intersection = null;
                for (const inter of intersects) {
                    const mat = inter.object.material;
                    const transparent = Array.isArray(mat) ? false : mat.transparent;
                    if (!transparent || inter.distance < 3) { intersection = inter; break; }
                }

                if (!intersection) { breakAction = placeAction = false; return; }

                const instanceId = intersection.instanceId;
                const mesh = intersection.object;
                const matrix = new THREE.Matrix4();
                mesh.getMatrixAt(instanceId, matrix);
                const blockPos = new THREE.Vector3().setFromMatrixPosition(matrix).sub(new THREE.Vector3(0.5, 0.5, 0.5));
                const normal = intersection.face.normal.clone();
                const normalMatrix = new THREE.Matrix3().getNormalMatrix(matrix);
                normal.applyMatrix3(normalMatrix).normalize();

                const ix = Math.round(blockPos.x);
                const iy = Math.round(blockPos.y);
                const iz = Math.round(blockPos.z);

                if (breakAction) {
                    setBlock(ix, iy, iz, BLOCKS.AIR);
                } else if (placeAction) {
                    const newX = ix + Math.round(normal.x);
                    const newY = iy + Math.round(normal.y);
                    const newZ = iz + Math.round(normal.z);

                    if (getBlock(newX, newY, newZ) === BLOCKS.AIR) {
                        const box = player.getCollisionBox();
                        const blockBox = {
                            minX: newX, maxX: newX + 1,
                            minY: newY, maxY: newY + 1,
                            minZ: newZ, maxZ: newZ + 1
                        };
                        const collides = !(box.maxX < blockBox.minX || box.minX > blockBox.maxX ||
                                         box.maxY < blockBox.minY || box.minY > blockBox.maxY ||
                                         box.maxZ < blockBox.minZ || box.minZ > blockBox.maxZ);
                        if (!collides) {
                            setBlock(newX, newY, newZ, selectedBlockId);
                        }
                    }
                }
            }
            breakAction = placeAction = false;
        }

        function updatePhysics(delta) {
            player.vel.y += GRAVITY * delta;
            const dx = player.vel.x * delta;
            const dy = player.vel.y * delta;
            const dz = player.vel.z * delta;

            player.pos.y += dy;
            const h = player.getHeight();
            player.onGround = false;
            let box = player.getCollisionBox();
            let resolvedY = false;
            
            for (let x = Math.floor(box.minX); x <= Math.floor(box.maxX); x++) {
                for (let z = Math.floor(box.minZ); z <= Math.floor(box.maxZ); z++) {
                    for (let y = Math.floor(box.minY); y <= Math.floor(box.maxY); y++) {
                        if (isBlockSolid(getBlock(x, y, z))) {
                            if (dy < 0) {
                                player.pos.y = y + 1;
                                player.vel.y = 0;
                                player.onGround = true;
                            } else if (dy > 0) {
                                player.pos.y = y - h;
                                player.vel.y = 0;
                            }
                            resolvedY = true;
                            break;
                        }
                    }
                    if (resolvedY) break;
                }
                if (resolvedY) break;
            }

            player.pos.x += dx;
            box = player.getCollisionBox();
            let resolvedX = false;
            
            for (let x = Math.floor(box.minX); x <= Math.floor(box.maxX); x++) {
                for (let z = Math.floor(box.minZ); z <= Math.floor(box.maxZ); z++) {
                    for (let y = Math.floor(box.minY); y <= Math.floor(box.maxY); y++) {
                        if (isBlockSolid(getBlock(x, y, z))) {
                            if (dx > 0) player.pos.x = x - PLAYER_WIDTH / 2;
                            else if (dx < 0) player.pos.x = x + 1 + PLAYER_WIDTH / 2;
                            resolvedX = true;
                            break;
                        }
                    }
                    if (resolvedX) break;
                }
                if (resolvedX) break;
            }

            player.pos.z += dz;
            box = player.getCollisionBox();
            let resolvedZ = false;
            
            for (let x = Math.floor(box.minX); x <= Math.floor(box.maxX); x++) {
                for (let z = Math.floor(box.minZ); z <= Math.floor(box.maxZ); z++) {
                    for (let y = Math.floor(box.minY); y <= Math.floor(box.maxY); y++) {
                        if (isBlockSolid(getBlock(x, y, z))) {
                            if (dz > 0) player.pos.z = z - PLAYER_WIDTH / 2;
                            else if (dz < 0) player.pos.z = z + 1 + PLAYER_WIDTH / 2;
                            resolvedZ = true;
                            break;
                        }
                    }
                    if (resolvedZ) break;
                }
                if (resolvedZ) break;
            }

            if (player.pos.y < VOID_Y) player.respawn();
        }

        function initUI() {
            updateHotbarUI();
            populateInventoryGrid();
            updateInventoryHotbarUI();

            if (isTouchDevice) {
                mobileControlsEl.style.display = 'block';
            } else {
                mobileControlsEl.style.display = 'none';
            }

            menuButton.addEventListener('click', toggleMenu);
            inventoryButton.addEventListener('click', toggleInventory);
            inventoryCloseButton.addEventListener('click', toggleInventory);
            resumeButton.addEventListener('click', closeAllModals);
            saveButton.addEventListener('click', () => { showMessage('Мір збережено!', 1500); });
            loadButton.addEventListener('click', () => { closeAllModals(); hideMessage(500); });
            resetButton.addEventListener('click', () => { confirmText.textContent = 'Чо?'; confirmModal.style.display = 'block'; menuModal.style.display = 'none'; });
            backToMenuButton.addEventListener('click', () => { window.location.href = 'zefagarymenu.html'; });
            confirmNo.addEventListener('click', () => { confirmModal.style.display = 'none'; toggleMenu(); });
            confirmYes.addEventListener('click', () => { confirmModal.style.display = 'none'; showMessage('Генерація новава міра...'); chunks.clear(); generateWorld(); player.respawn(); hideMessage(500); });
            document.addEventListener('mousemove', (event) => { if (isInventoryOpen) { inventoryHand.style.left = event.clientX + 'px'; inventoryHand.style.top = event.clientY + 'px'; } });
        }

        init();
    </script>
